<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ baby_name }} – Viewer</title>
  <link rel="stylesheet" href="base.css?v=4">
</head>

<body>
  {% include 'menubar.html' %}

  <h1 class="viewer-page-title">📺 Live Viewer</h1>

  <div class="viewer-page-stack">
    <div id="hud">
      <div id="status-dot" class="connecting"></div>
      <div id="status-text">Connecting…</div>
      <div id="sound-meter">
        <div class="sound-bars" id="sound-bars"></div>
      </div>
    </div>

    <video id="stream" autoplay playsinline disableRemotePlayback=true muted>
      <!-- disble remote playback is required for iOS to send the video start event -->
      <!-- Muted is required for autiplay -->
    </video>

    <div id="controls">
      <button id="unmute-btn" onclick="unmute()">🔊 Tap to unmute</button>
    </div>

    <div id="mimeSupportPanel" aria-label="ManagedMediaSource MIME type support">
      <h2>ManagedMediaSource.isTypeSupported</h2>
      <ul id="mime-support-list"></ul>
    </div>

    <div class="audio-chart-container">
      <canvas id="viewer-audio-chart" class="audio-chart-canvas"></canvas>
    </div>

    <!-- <div id="fetch-status">Updated: never</div> -->

    <div class="audio-level-display">
      <div class="audio-bar">
        <div class="audio-bar-label">RMS</div>
        <div class="audio-bar-container">
          <div class="audio-bar-fill" id="rms-bar"></div>
        </div>
        <div class="audio-bar-value" id="rms-value">0</div>
      </div>
      <div class="audio-bar">
        <div class="audio-bar-label">Peak</div>
        <div class="audio-bar-container">
          <div class="audio-bar-fill" id="peak-bar"></div>
        </div>
        <div class="audio-bar-value" id="peak-value">0</div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div id="overlay-icon">👶</div>
    <div id="overlay-msg">Waiting for camera…</div>
  </div>

  <!-- Bump ?v= when these scripts change to force cache invalidation. -->
  <script src="/chart.umd.min.js"></script>
  <script src="/audioChart.js?v=1"></script>
  <script src="/audioVisualizer.js?v=2.2"></script>
  <script src="/viewer.js?v=3.4"></script>
</body>

</html>
