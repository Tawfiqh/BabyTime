<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ baby_name }} – Slow Viewer</title>
  <link rel="stylesheet" href="base.css?v=2">
  <script src="/chart.umd.min.js"></script>
  <script src="/audioChart.js?v=1"></script>
  <style>
    #slow-viewer-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }

    #snapshot-image {
      width: 100%;
      border-radius: 1rem;
      background: #1a1a24;
      display: none;
    }

    #snapshot-timestamp {
      font-size: 0.75rem;
      color: #888;
      text-align: center;
    }

    #fetch-status {
      font-size: 0.8rem;
      text-align: center;
      color: #888;
      margin-top: 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
    }
  </style>
</head>

<body>
  {% include 'menubar.html' %}
  <h1>📱 Slow Viewer</h1>

  <div id="slow-viewer-container">
    <div id="hud">
      <div id="status-dot" class="connecting"></div>
      <div id="status-text">Connecting…</div>
      <div id="snapshot-timestamp"></div>
    </div>

    <img id="snapshot-image" alt="Latest snapshot">


    <div class="audio-level-display">
      <div class="audio-bar">
        <div class="audio-bar-label">RMS</div>
        <div class="audio-bar-container">
          <div class="audio-bar-fill" id="rms-bar" style="width: 0%"></div>
        </div>
        <div class="audio-bar-value" id="rms-value">0</div>
      </div>
      <div class="audio-bar">
        <div class="audio-bar-label">Peak</div>
        <div class="audio-bar-container">
          <div class="audio-bar-fill" id="peak-bar" style="width: 0%"></div>
        </div>
        <div class="audio-bar-value" id="peak-value">0</div>
      </div>
    </div>

    <div class="audio-chart-container">
      <canvas id="audio-chart" class="audio-chart-canvas"></canvas>
    </div>

    <div id="fetch-status">Updated: never</div>
  </div>

  <script src="/slowviewer.js?v=2"></script>
</body>

</html>
